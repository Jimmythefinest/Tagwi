<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="main">
        <div class="sidebar">
            <h2>Admin</h2>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #1e293b;">
            <a href="dashboard.html"
                style="color: white; display: block; margin-bottom: 15px; text-decoration: none;">Dashboard</a>
            <a href="products.html"
                style="color: white; display: block; margin-bottom: 15px; text-decoration: none;">Manage Products</a>
            <a href="orders.html" style="color: white; display: block; margin-bottom: 15px; text-decoration: none;">View
                Orders</a>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #1e293b;">
            <button onclick="localStorage.removeItem('admin'); window.location.href='login.html'"
                style="background: transparent; color: white; border: 1px solid white; width: 100%;">Logout</button>
        </div>

        <div class="content" style="flex-grow: 1;">
            <h2>Dashboard</h2>

            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div class="card" style="flex: 1; text-align: center; background: #3b82f6; color: white;">
                    <h3>Total Products</h3>
                    <p id="count" style="font-size: 2.5em; font-weight: bold; margin-top: 10px;">0</p>
                </div>
                <div class="card" style="flex: 1; text-align: center; background: #10b981; color: white;">
                    <h3>Recent Orders</h3>
                    <p id="orderCount" style="font-size: 2.5em; font-weight: bold; margin-top: 10px;">0</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>

    <script>
        checkAdmin();

        fetch("http://localhost:5000/api/products")
            .then(r => r.json())
            .then(d => document.getElementById("count").innerHTML = d.length);

        fetch("http://localhost:5000/api/orders")
            .then(r => r.json())
            .then(d => document.getElementById("orderCount").innerHTML = d.length);
    </script>

</body>

</html>
