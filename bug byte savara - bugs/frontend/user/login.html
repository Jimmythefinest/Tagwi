<!DOCTYPE html>
<html>
<head>
    <!-- I delight added bootstap5 inline -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <title>User Login</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="center-box p-4 shadow bg-white rounded" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-4">User Login</h2>
        
        <div class="mb-3">
            <input id="username" class="form-control" placeholder="Enter username">
        </div>
        
        <div class="mb-3">
            <input id="password" type="password" class="form-control" placeholder="Enter password">
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="userLogin()">Login</button>
            <div class="text-center mt-2">
                <a href="register.html" class="text-decoration-none">Register</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/app.js"></script>
</body>
</html>
