<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <div class="navbar">
    <h2>BugByte</h2>
    <a href="home.html" style="color: white; text-decoration: none;">Products</a>
    <button onclick="localStorage.removeItem('user'); window.location.href='login.html'"
      style="background: transparent; color: white; border: 1px solid white;">Logout</button>
  </div>

  <div class="content">
    <h2>Your Cart</h2>
    <div id="cartItems" style="margin-top: 20px;"></div>

    <div id="cartTotal" style="margin-top: 20px; font-weight: bold; font-size: 1.2em;"></div>

    <div id="checkoutBtn" style="margin-top: 20px; display: none;">
      <button onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
    </div>

    <p id="emptyMsg" style="display: none; margin-top: 20px;">Your cart is empty. <a href="home.html">Start
        shopping!</a></p>
  </div>

  <script src="../js/app.js"></script>
  <script>
    checkUser(); // PROTECTION
    const cart = JSON.parse(localStorage.getItem("cartItems")) || [];
    const itemsDiv = document.getElementById("cartItems");
    const totalDiv = document.getElementById("cartTotal");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const emptyMsg = document.getElementById("emptyMsg");

    if (cart.length === 0) {
      emptyMsg.style.display = "block";
    } else {
      checkoutBtn.style.display = "block";
      let total = 0;
      cart.forEach((i, index) => {
        total += i.price;
        itemsDiv.innerHTML += `
      <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <span>${i.name}</span>
        <span>₹${i.price}</span>
      </div>
    `;
      });
      totalDiv.innerHTML = `Total: ₹${total}`;
    }
  </script>

</body>

</html>
