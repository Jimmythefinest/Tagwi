<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <h2>BugByte</h2>
        <a href="cart.html" style="color: white; text-decoration: none;">Back to Cart</a>
    </div>

    <div class="content">
        <div class="center-box">
            <h2>Checkout</h2>

            <p id="summary" style="margin-bottom: 20px; font-weight: bold;"></p>

            <input id="name" placeholder="Full Name">
            <input id="card" placeholder="Card Number">

            <button onclick="placeOrder()" style="width: 100%; margin-top: 10px;">Pay Now</button>
            <p id="totalDisplay" style="margin-top: 20px; font-size: 1.2em; font-weight: bold;">Total: ₹0</p>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        checkUser(); // PROTECTION
        const cart = JSON.parse(localStorage.getItem("cartItems")) || [];
        const total = cart.reduce((acc, item) => acc + item.price, 0);
        document.getElementById("totalDisplay").innerHTML = `Total: ₹${total}`;
        document.getElementById("summary").innerHTML = `${cart.length} item(s) in your cart`;
    </script>
</body>

</html>
